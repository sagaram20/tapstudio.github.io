name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.XSERVER_HOST }}
          username: ${{ secrets.XSERVER_USERNAME }}
          password: ${{ secrets.XSERVER_FTP_PASSWORD }}
          server-dir: tapstudio.jp/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/.vscode/**
            **/requirement.md
            **/README.md
